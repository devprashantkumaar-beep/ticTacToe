<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="x-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="o-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fe0979"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
    <filter id="glow-x" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-o" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d1117" stroke="url(#grid-grad)" stroke-width="6"/>

  <!-- Grid Lines -->
  <g stroke="url(#grid-grad)" stroke-width="12" stroke-linecap="round">
    <line x1="180" y1="60" x2="180" y2="452"/>
    <line x1="332" y1="60" x2="332" y2="452"/>
    <line x1="60" y1="180" x2="452" y2="180"/>
    <line x1="60" y1="332" x2="452" y2="332"/>
  </g>

  <!-- Cyan X (Top-Left) -->
  <g filter="url(#glow-x)">
    <line x1="90" y1="90" x2="150" y2="150" stroke="url(#x-grad)" stroke-width="16" stroke-linecap="round"/>
    <line x1="150" y1="90" x2="90" y2="150" stroke="url(#x-grad)" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Magenta O (Center) -->
  <circle cx="256" cy="256" r="36" fill="none" stroke="url(#o-grad)" stroke-width="16" stroke-linecap="round" filter="url(#glow-o)"/>

  <!-- Cyan X (Bottom-Right) -->
  <g filter="url(#glow-x)">
    <line x1="362" y1="362" x2="422" y2="422" stroke="url(#x-grad)" stroke-width="16" stroke-linecap="round"/>
    <line x1="422" y1="362" x2="362" y2="422" stroke="url(#x-grad)" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
